name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (e.g. 1.0.0-rc.1)
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${{ inputs.version }}"
          if [ -n "$TAG" ]; then
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          elif [ -n "$VERSION" ]; then
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "error: no version provided" >&2
            exit 1
          fi

      - name: Run tests
        run: ./gradlew check
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GHA_READ_PACKAGES_TOKEN }}

      - name: Publish and stage to Maven Central (release manually at central.sonatype.com)
        if: ${{ !contains(steps.version.outputs.version, '-') }}
        run: ./gradlew publishToSonatype closeSonatypeStagingRepository
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.OSSRH_PASSWORD }}

      - name: Publish GitHub Packages only (RC)
        if: ${{ contains(steps.version.outputs.version, '-') }}
        run: ./gradlew publishMavenPublicationToGitHubPackagesRepository
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_SIGNING_PASSWORD: ${{ secrets.GPG_SIGNING_PASSWORD }}
